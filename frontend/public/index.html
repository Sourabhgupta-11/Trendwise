<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description" content="TrendWise — AI-powered trending news from India, updated daily." />
    <meta property="og:title" content="TrendWise" />
    <meta property="og:description" content="AI-curated trending news from India, refreshed every day." />
    <meta property="og:type" content="website" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>TrendWise — AI Trending News</title>

    <!-- Bootstrap CSS — preload for speed -->
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"></noscript>

    <!-- Critical inline CSS so app shell renders instantly before JS loads -->
    <style>
      *,*::before,*::after{box-sizing:border-box}
      body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#1a1a2e;overflow-x:hidden}
      #root{min-height:100vh}
      /* Instant dark splash so there's no white flash */
      .tw-splash{position:fixed;inset:0;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:9999;transition:opacity .4s ease}
      .tw-splash.hide{opacity:0;pointer-events:none}
      .tw-splash-logo{font-size:2.5rem}
      .tw-dots{display:flex;gap:8px}
      .tw-dot{width:10px;height:10px;border-radius:50%;background:#818cf8;animation:tw-b 1.2s ease-in-out infinite}
      .tw-dot:nth-child(2){animation-delay:.2s}
      .tw-dot:nth-child(3){animation-delay:.4s}
      @keyframes tw-b{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-10px);opacity:1}}
    </style>
  </head>
  <body>
    <!-- Instant splash shown before React boots — removed once app mounts -->
    <div class="tw-splash" id="tw-splash">
      <div class="tw-splash-logo">🧠</div>
      <div class="tw-dots">
        <div class="tw-dot"></div>
        <div class="tw-dot"></div>
        <div class="tw-dot"></div>
      </div>
    </div>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- Bootstrap JS — defer so it doesn't block render -->
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"></script>
  </body>
</html>
